server:
  port: 8081
  servlet:
    context-path: /api
# 自定义属性（可选）
app:
  upload-dir: ${APP_UPLOAD_DIR:/data/uploads/}  # 默认为容器中的挂载目录，可通过 APP_UPLOAD_DIR 覆盖
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/gbs_commerce_system_02?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  jackson:
    date-format: yyyy-MM-dd
    time-zone: GMT+8



mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl




shiro:
  loginUrl: /auth/login
  unauthorizedUrl: /unauthorized

# Baidu AI Face configuration
baidu:
  ai:
    app-id: ${BAIDU_AI_APP_ID:}
    api-key: ${BAIDU_AI_API_KEY:}
    secret-key: ${BAIDU_AI_SECRET_KEY:}
    group-id: ${BAIDU_AI_GROUP_ID:}


springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
  cache:
    disabled: true